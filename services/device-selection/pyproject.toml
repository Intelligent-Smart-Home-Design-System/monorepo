[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "iot-device-selection"
dynamic = ["version"]
description = ''
readme = "README.md"
requires-python = ">=3.8"
license = "MIT"
keywords = []
authors = [
  { name = "U.N. Owen", email = "void@some.where" },
]
classifiers = [
  "Development Status :: 4 - Beta",
  "Programming Language :: Python",
  "Programming Language :: Python :: 3.8",
  "Programming Language :: Python :: 3.9",
  "Programming Language :: Python :: 3.10",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Programming Language :: Python :: Implementation :: CPython",
  "Programming Language :: Python :: Implementation :: PyPy",
]
dependencies = []

[project.urls]
Documentation = "https://github.com/U.N. Owen/iot-device-selection#readme"
Issues = "https://github.com/U.N. Owen/iot-device-selection/issues"
Source = "https://github.com/U.N. Owen/iot-device-selection"

[project.scripts]
mycli = "iot_device_selection.cli:main"

[tool.hatch.version]
path = "src/iot_device_selection/__about__.py"

[tool.hatch.envs.types]
extra-dependencies = [
  "mypy>=1.0.0",
]
[tool.hatch.envs.types.scripts]
check = "mypy --install-types --non-interactive {args:src/iot_device_selection tests}"

[tool.coverage.run]
source_pkgs = ["iot_device_selection", "tests"]
branch = true
parallel = true
omit = [
  "src/iot_device_selection/__about__.py",
]

[tool.coverage.paths]
iot_device_selection = ["src/iot_device_selection", "*/iot-device-selection/src/iot_device_selection"]
tests = ["tests", "*/iot-device-selection/tests"]

[tool.coverage.report]
exclude_lines = [
  "no cov",
  "if __name__ == .__main__.:",
  "if TYPE_CHECKING:",
]
