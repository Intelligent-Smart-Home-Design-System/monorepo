services:
  temporal:
    container_name: temporal
    image: temporalio/auto-setup:1.23.0
    ports:
      - "7233:7233"
    environment:
      - DB=postgresql
      - DB_PORT=5432
      - POSTGRES_USER=temporal
      - POSTGRES_PWD=temporal
      - POSTGRES_SEEDS=postgresql
    depends_on:
      - postgresql
    networks:
      - temporal-network

  postgresql:
    container_name: temporal-postgresql
    image: postgres:13-alpine
    environment:
      POSTGRES_PASSWORD: temporal
      POSTGRES_USER: temporal
    ports:
      - "5432:5432"
    networks:
      - temporal-network

  temporal-ui:
    container_name: temporal-ui
    image: temporalio/ui:2.21.3
    depends_on:
      - temporal
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
    ports:
      - "8080:8080"
    networks:
      - temporal-network

  temporal-admin-tools:
    container_name: temporal-admin-tools
    image: temporalio/admin-tools:1.23.0
    depends_on:
      - temporal
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
    stdin_open: true
    tty: true
    networks:
      - temporal-network

  temporal-worker:
    container_name: temporal-worker
    build:
      context: .
      target: worker
    environment:
      - TEMPORAL_HOST=temporal:7233
      - LOG_LEVEL=info
      - TRACING_ENABLED=true
      - OTEL_EXPORTER_OTLP_ENDPOINT=jaeger:4317
      - OTEL_EXPORTER_OTLP_INSECURE=true
    depends_on:
      - temporal
      - jaeger
    restart: unless-stopped
    networks:
      - temporal-network

  temporal-client:
    container_name: temporal-client
    build:
      context: .
      target: client
    environment:
      - TEMPORAL_HOST=temporal:7233
      - LOG_LEVEL=info
      - TRACING_ENABLED=true
      - OTEL_EXPORTER_OTLP_ENDPOINT=jaeger:4317
      - OTEL_EXPORTER_OTLP_INSECURE=true
    depends_on:
      - temporal
      - temporal-worker
      - jaeger
    profiles:
      - tools
    networks:
      - temporal-network

  jaeger:
    container_name: jaeger
    image: jaegertracing/all-in-one:1.57
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    ports:
      - "16686:16686"
      - "4317:4317"
      - "4318:4318"
    networks:
      - temporal-network

  loki:
    container_name: loki
    image: grafana/loki:2.9.8
    command: -config.file=/etc/loki/local-config.yaml
    ports:
      - "3100:3100"
    volumes:
      - ./observability/loki/loki-config.yml:/etc/loki/local-config.yaml:ro
      - loki-data:/loki
    networks:
      - temporal-network

  promtail:
    container_name: promtail
    image: grafana/promtail:2.9.8
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki
    volumes:
      - ./observability/promtail/promtail-config.yml:/etc/promtail/config.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - temporal-network

  grafana:
    container_name: grafana
    image: grafana/grafana:10.4.3
    depends_on:
      - loki
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
    networks:
      - temporal-network

networks:
  temporal-network:
    driver: bridge

volumes:
  loki-data:
  grafana-data:
