# Re-scrape/re-parse dns pages deactivated after repeated failures
# (is_active=false, see tracked_page_repo.go SetStatus).
# Used by pipeline.retry-failed.toml (scraper-scrape + scraper-parse only,
# no discovery — we're retrying already-tracked pages).
#
#   make pipeline-build && make pipeline-up
#   make pipeline-trigger PIPELINE_CONFIG=/app/config/pipeline.retry-failed.toml
#
# Successful pages get is_active reset to true automatically; anything still
# blocked after 3 attempts (rotation + browser escalation) stays deactivated
# for the next run.

[database]
host = "catalog-postgresql"
port = 5432
user = "catalog"
password = "catalog"
dbname = "smart_home"
sslmode = "disable"

[scraping]
max_retries = 3
rate_limit_rps = 1.0
timeout = "120s"
user_agent = "Mozilla/5.0 (Linux; Android 14; Mobile) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Mobile Safari/537.36"
proxy = ""
max_concurrency = 3

# Drive the retry-only mode straight from config — no extra flags needed.
retry_failed = true
retry_since = "8h" # only retry pages last attempted within this window

[dns]
browser_user_mode = true
brand_aliases = { "яндекс" = "yandex", "сбер" = "sber", "маруся" = "vk", "moes" = "moes" }
smart_home_device_markers = [
  "Алиса", "Маруся", "Zigbee", "умный дом",
  "умная лампа", "умный свет", "Wi-Fi", "WiFi", "Matter", "Умн", "moes"
]

# scrape: no created_after/limit — retry_failed above already scopes the
# task list (is_active=false + retry_since); a job-level date filter here
# would just re-exclude the pages we're trying to retry.
[jobs.scrape.dns]

# parse: without a filter this reparses every dns snapshot ever taken.
# Scope it to roughly the same window so it only picks up what this retry
# run (plus today's earlier backlog) actually produced.
[jobs.parse.dns]
scraped_after = 2026-07-22T12:00:00+03:00
