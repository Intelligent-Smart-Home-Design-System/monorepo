# Centralized observability stack for the entire monorepo.
#
# Usage:
#   docker compose -f docker-compose.monitoring.yaml up -d
#
# All application services should set:
#   OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
#   OTEL_EXPORTER_OTLP_INSECURE=true
#
# The stack exposes:
#   - Grafana        → http://localhost:3000  (admin / admin)
#   - Prometheus     → http://localhost:9090
#   - Loki           → http://localhost:3100
#   - Jaeger UI      → http://localhost:16686
#   - OTEL Collector → grpc://localhost:4317, http://localhost:4318

services:
  # ── OpenTelemetry Collector ────────────────────────────────────────
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.104.0
    command: ["--config=/etc/otelcol/config.yaml"]
    volumes:
      - ./otel-collector-config.yaml:/etc/otelcol/config.yaml:ro
    ports:
      - "${OTEL_GRPC_PORT:-4317}:4317"   # OTLP gRPC
      - "${OTEL_HTTP_PORT:-4318}:4318"   # OTLP HTTP
      - "8888:8888"                       # Collector metrics
    depends_on:
      - loki
      - jaeger
      - prometheus
    networks:
      - monitoring
    restart: unless-stopped

  # ── Jaeger (distributed tracing) ───────────────────────────────────
  jaeger:
    image: jaegertracing/all-in-one:1.57
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
      SPAN_STORAGE_TYPE: badger
      BADGER_EPHEMERAL: "false"
      BADGER_DIRECTORY_VALUE: /badger/data
      BADGER_DIRECTORY_KEY: /badger/key
    volumes:
      - jaeger-data:/badger
    ports:
      - "${JAEGER_UI_PORT:-16686}:16686"   # Jaeger UI
    networks:
      - monitoring
    restart: unless-stopped

  # ── Grafana Loki (log aggregation) ─────────────────────────────────
  loki:
    image: grafana/loki:3.1.0
    command: ["-config.file=/etc/loki/config.yaml"]
    volumes:
      - ./observability/loki/loki-config.yaml:/etc/loki/config.yaml:ro
      - loki-data:/loki
    ports:
      - "${LOKI_PORT:-3100}:3100"
    networks:
      - monitoring
    restart: unless-stopped

  # ── Prometheus (metrics) ───────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.54.1
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--web.enable-remote-write-receiver"
      - "--storage.tsdb.path=/prometheus"
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    networks:
      - monitoring
    restart: unless-stopped

  # ── Grafana (dashboards & exploration) ─────────────────────────────
  grafana:
    image: grafana/grafana:11.1.4
    depends_on:
      - prometheus
      - loki
      - jaeger
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    networks:
      - monitoring
    restart: unless-stopped

networks:
  monitoring:
    name: monorepo-monitoring
    driver: bridge

volumes:
  jaeger-data:
  loki-data:
  prometheus-data:
  grafana-data:
