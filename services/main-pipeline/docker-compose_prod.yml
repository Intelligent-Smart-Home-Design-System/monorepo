services:
  temporal-postgresql:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: temporal
      POSTGRES_USER: temporal
      POSTGRES_PASSWORD: temporal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U temporal -d temporal"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - temporal-postgresql-data:/var/lib/postgresql/data

  temporal:
    image: temporalio/auto-setup:1.23.0
    depends_on:
      temporal-postgresql:
        condition: service_healthy
    environment:
      DB: postgresql
      DB_PORT: 5432
      POSTGRES_USER: temporal
      POSTGRES_PWD: temporal
      POSTGRES_SEEDS: temporal-postgresql
    ports:
      - "7233:7233"

  temporal-ui:
    image: temporalio/ui:2.21.3
    depends_on:
      - temporal
    environment:
      TEMPORAL_ADDRESS: temporal:7233
    ports:
      - "8088:8080"

  catalog-db-migrate:
    image: migrate/migrate:v4.18.3
    command: ["-path", "/migrations", "-database", "postgres://${CATALOG_DB_USER:-catalog}:${CATALOG_DB_PASSWORD:-catalog}@${CATALOG_DB_HOST:-catalog-postgresql}:${CATALOG_DB_PORT:-5432}/${CATALOG_DB_NAME:-smart_home}?sslmode=${CATALOG_DB_SSLMODE:-disable}", "up"]
    volumes:
      - ../../db/catalog/migrations:/migrations:ro
    restart: "no"

  main-pipeline:
    build:
      context: .
    depends_on:
      - temporal
      - floor-parser-worker
      - layout-worker
      - device-selection-worker
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_NAMESPACE: default
      METRICS_ADDRESS: :2112
      LOG_LEVEL: info
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-otel-collector:4317}
      OTEL_EXPORTER_OTLP_INSECURE: "true"
    ports:
      - "2112:2112"
    networks:
      - default
      - monorepo-monitoring
    restart: unless-stopped

  api-gateway:
    build:
      context: .
    entrypoint: ["api-gateway"]
    depends_on:
      temporal:
        condition: service_started
      main-pipeline:
        condition: service_started
      catalog-db-migrate:
        condition: service_completed_successfully
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_NAMESPACE: default
      DATABASE_DSN: postgres://${CATALOG_DB_USER:-catalog}:${CATALOG_DB_PASSWORD:-catalog}@${CATALOG_DB_HOST:-catalog-postgresql}:${CATALOG_DB_PORT:-5432}/${CATALOG_DB_NAME:-smart_home}?sslmode=${CATALOG_DB_SSLMODE:-disable}
      HTTP_ADDRESS: :8080
      METRICS_ADDRESS: :2116
      JWT_SECRET: ${JWT_SECRET:-dev-jwt-secret}
      LOG_LEVEL: info
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-otel-collector:4317}
      OTEL_EXPORTER_OTLP_INSECURE: "true"
    ports:
      - "2116:2116"
    networks:
      - default
      - monorepo-monitoring
    restart: unless-stopped

  frontend-api:
    build:
      context: ../frontend-api
    depends_on:
      catalog-db-migrate:
        condition: service_completed_successfully
    environment:
      DATABASE_DSN: postgres://${CATALOG_DB_USER:-catalog}:${CATALOG_DB_PASSWORD:-catalog}@${CATALOG_DB_HOST:-catalog-postgresql}:${CATALOG_DB_PORT:-5432}/${CATALOG_DB_NAME:-smart_home}?sslmode=${CATALOG_DB_SSLMODE:-disable}
      HTTP_ADDRESS: :8080
    ports:
      - "2117:8080"
    restart: unless-stopped

  web:
    build:
      context: ../../frontend
      target: next
      args:
        APP: web
    expose:
      - "3000"
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - api-gateway
      - frontend-api
      - web
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
    ports:
      - "8090:80"
    restart: unless-stopped

  floor-parser-worker:
    build:
      context: ../floor-parser
    depends_on:
      - temporal
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_NAMESPACE: default
      TEMPORAL_TASK_QUEUE: floor-parser
      METRICS_PORT: 2113
    ports:
      - "2113:2113"
    restart: unless-stopped

  layout-worker:
    build:
      context: ../layout
    depends_on:
      - temporal
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_NAMESPACE: default
      TEMPORAL_TASK_QUEUE: layout
      METRICS_ADDRESS: :2114
    ports:
      - "2114:2114"
    restart: unless-stopped

  device-selection-worker:
    build:
      context: ../device-selection
    depends_on:
      catalog-db-migrate:
        condition: service_completed_successfully
      temporal:
        condition: service_started
    command: ["device-selection", "run", "--config", "/config/device-selection.toml"]
    environment:
      METRICS_PORT: 2115
    volumes:
      - ./config/device-selection.toml:/config/device-selection.toml:ro
    ports:
      - "2115:2115"
    restart: unless-stopped

networks:
  monorepo-monitoring:
    external: true

volumes:
  temporal-postgresql-data:
