# This workflow will build a golang project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-go

name: Go

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:

  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Generate filters from device_types.json
      run: |
          rm -f services/layout/internal/filters/filters_gen.go
          cd shared/schemas/devices
          python3 gen_filters.py
      shell: bash
  
    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.24'

    - name: Build_simulation
      run: go build -v ./...
      working-directory: services/simulation

    - name: Test_simulation
      run: go test -v ./...
      working-directory: services/simulation
    
    - name: Build_layout
      run: go build -v ./...
      working-directory: services/layout

    - name: Test_layout
      run: go test -v ./...
      working-directory: services/layout

    - name: Build_scraper
      run: go build -v ./...
      working-directory: services/scraper

    - name: Test_scraper
      run: go test -v ./...
      working-directory: services/scraper

    - name: Build_catalog-builder
      run: go build -v ./...
      working-directory: services/catalog-builder

    - name: Test_catalog-builder
      run: go test -v ./...
      working-directory: services/catalog-builder
