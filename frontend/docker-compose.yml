services:
  sim-ui:
    build:
      context: ..
      dockerfile: frontend/Dockerfile
      args:
        APP: sim-ui
      target: next
    ports:
      - "3000:3000"

  web:
    build:
      context: ..
      dockerfile: frontend/Dockerfile
      args:
        APP: web
      target: next
    ports:
      - "3001:3000"

  apartment-ui:
    build:
      context: ..
      dockerfile: frontend/Dockerfile
      args:
        APP: apartment-ui
      target: vite
    ports:
      - "8080:80"
