version: "3.8"

services:
  web:
    build: .
    container_name: test_temporal_server
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - HELLO_NAME=World
    restart: unless-stopped
    networks:
      - app-network
    healthcheck:
      test:
        [
          "CMD",
          "sh",
          "-c",
          "wget --no-verbose --tries=1 --spider http://localhost:8080/health || exit 1",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  app-network:
    driver: bridge
