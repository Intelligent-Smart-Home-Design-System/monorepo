openapi: 3.0.3
info:
  title: Smart Home Planning API
  version: 1.0.0
  description: API for creating, generating, listing, and retrieving smart home planning sessions and their device bundle snapshots.

paths:
  /api/v1/device-types:
    get:
      summary: List device types
      operationId: listDeviceTypes
      responses:
        '200':
          description: Device types
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/DeviceType'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/v1/ecosystems:
    get:
      summary: List ecosystems
      operationId: listEcosystems
      responses:
        '200':
          description: Ecosystems
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Ecosystem'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/v1/presets:
    get:
      summary: List presets
      operationId: listPresets
      responses:
        '200':
          description: Presets
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Preset'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/v1/plans:
    get:
      summary: List planning sessions
      operationId: listPlans
      responses:
        '200':
          description: A list of plan summaries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PlanSummary'
        '500':
          $ref: '#/components/responses/InternalError'

    post:
      summary: Create and start generating a new home plan
      operationId: createPlan
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePlanRequest'
      responses:
        '202':
          description: Plan accepted and generation started
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreatePlanResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/v1/plans/{plan_id}:
    get:
      summary: Get a plan snapshot
      operationId: getPlan
      parameters:
        - $ref: '#/components/parameters/PlanId'
      responses:
        '200':
          description: Full plan snapshot
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HomePlan'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/v1/plans/{plan_id}/status:
    get:
      summary: Get plan generation status
      operationId: getPlanStatus
      parameters:
        - $ref: '#/components/parameters/PlanId'
      responses:
        '200':
          description: Current generation status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlanStatus'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

components:
  parameters:
    PlanId:
      name: plan_id
      in: path
      required: true
      schema:
        type: integer

  responses:
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    InternalError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  schemas:
    DeviceType:
      type: object
      required:
        - id
        - name
        - filters
      properties:
        id:
          type: string
          example: smart_lamp
        name:
          type: string
          example: Smart Lamp
        filters:
          type: array
          items:
            $ref: '#/components/schemas/DeviceTypeFilterField'

    DeviceTypeFilterField:
      type: object
      required:
        - name
        - field
        - value_type
        - operations
      properties:
        name:
          type: string
          example: Brightness in lumens
        field:
          type: string
          example: brightness_lumens
        value_type:
          type: string
          enum: [string, number, integer, boolean]
        enum_values:
          type: array
          nullable: true
          description: Allowed values for enum-like fields
          items:
            type: string
          example: [e27, e14]
        operations:
          type: array
          items:
            $ref: '#/components/schemas/FilterOperation'

    FilterOperation:
      type: string
      enum: [eq, neq, gt, gte, lt, lte, contains, exists]

    Ecosystem:
      type: object
      required:
        - id
        - name
        - description
        - may_be_main
      properties:
        id:
          type: string
          example: yandex_home
        name:
          type: string
          example: Yandex Home
        description:
          type: string
          example: Smart home ecosystem and voice assistant platform.
        may_be_main:
          type: boolean
          example: true
        image_url:
          type: string
          format: uri
          nullable: true
          example: https://example.com/images/yandex-home.png

    Preset:
      type: object
      required:
        - id
        - name
        - requirements
      properties:
        id:
          type: string
          example: comfort
        name:
          type: string
          example: Comfort
        description:
          type: string
          nullable: true
        requirements:
          type: array
          items:
            $ref: '#/components/schemas/Requirement'

    PresetRequirement:
      type: object
      required:
        - device_type
        - quantity
      properties:
        device_type:
          type: string
          example: smart_lamp
        quantity:
          type: integer
          minimum: 1
          example: 5

    CreatePlanRequest:
      type: object
      required:
        - budget
        - main_ecosystem_id
        - requirements
      properties:
        budget:
          type: number
          format: float
          example: 500.0
        main_ecosystem_id:
          type: string
          example: yandex_home
        allowed_ecosystems:
          type: array
          nullable: true
          items:
            type: string
          example: [zigbee, matter]
        excluded_ecosystems:
          type: array
          nullable: true
          items:
            type: string
          example: [tuya]
        requirements:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/Requirement'

    CreatePlanResponse:
      type: object
      required:
        - plan_id
        - status
      properties:
        plan_id:
          type: integer
          example: 1
        status:
          type: string
          enum: [accepted]
        message:
          type: string
          example: Plan generation has started.

    Requirement:
      type: object
      required:
        - id
        - device_type
        - quantity
        - filters
      properties:
        id:
          type: integer
          example: 1
        device_type:
          type: string
          example: smart_lamp
        quantity:
          type: integer
          minimum: 1
          example: 3
        filters:
          type: array
          items:
            $ref: '#/components/schemas/RequirementFilter'

    RequirementFilter:
      type: object
      required:
        - field
        - operation
      properties:
        field:
          type: string
          example: brightness_lumens
        operation:
          $ref: '#/components/schemas/FilterOperation'
        value:
          nullable: true
          oneOf:
            - type: string
            - type: number
            - type: integer
            - type: boolean
          example: 800

    PlanStatus:
      type: object
      required:
        - plan_id
        - status
      properties:
        plan_id:
          type: integer
          example: 1
        status:
          type: string
          enum: [queued, generating, completed, failed]
        progress:
          type: number
          format: float
          minimum: 0
          maximum: 1
          nullable: true
          example: 0.6
        error:
          $ref: '#/components/schemas/ErrorResponse'

    PlanSummary:
      type: object
      required:
        - plan_id
        - created_at
        - budget
        - status
      properties:
        plan_id:
          type: integer
          example: 1
        created_at:
          type: string
          format: date-time
        budget:
          type: number
          format: float
          example: 500.0
        status:
          type: string
          enum: [queued, generating, completed, failed]

    HomePlan:
      type: object
      required:
        - plan_id
        - budget
        - main_ecosystem_id
        - requirements
        - bundles
      properties:
        plan_id:
          type: integer
          example: 1
        budget:
          type: number
          format: float
          example: 500.0
        main_ecosystem_id:
          type: string
          example: yandex_home
        allowed_ecosystems:
          type: array
          nullable: true
          items:
            type: string
        excluded_ecosystems:
          type: array
          nullable: true
          items:
            type: string
        requirements:
          type: array
          items:
            $ref: '#/components/schemas/Requirement'
        bundles:
          type: array
          items:
            $ref: '#/components/schemas/Bundle'

    Bundle:
      type: object
      required:
        - id
        - total_cost
        - quality_score
        - extra_ecosystems_used
        - hubs_used
        - is_recommended
        - listings
      properties:
        id:
          type: integer
          example: 1
        total_cost:
          type: number
          format: float
          example: 420.0
        quality_score:
          type: number
          format: float
          example: 0.82
        extra_ecosystems_used:
          type: integer
          minimum: 0
          example: 1
        hubs_used:
          type: integer
          minimum: 0
          example: 1
        is_recommended:
          type: boolean
          example: true
        ecosystems_used:
          type: array
          items:
            type: string
          example: [yandex, aqara]
        listings:
          type: array
          items:
            $ref: '#/components/schemas/Listing'

    Listing:
      type: object
      required:
        - id
        - name
        - device_brand
        - device_model
        - device_quality_score
        - price
        - url
        - image_url
        - devices_per_listing
        - units_to_buy
        - requirement_id
        - connection_info
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: Xiaomi Smart Lamp
        device_brand:
          type: string
          example: Xiaomi
        device_model:
          type: string
          example: Mi Lamp 2
        device_quality_score:
          type: number
          format: float
          example: 0.8
        price:
          type: number
          format: float
          example: 39.99
        url:
          type: string
          format: uri
          example: https://example.com/product/123
        image_url:
          type: string
          format: uri
          nullable: true
          example: https://example.com/images/lamp.png
        devices_per_listing:
          type: integer
          minimum: 1
          example: 1
        units_to_buy:
          type: integer
          minimum: 1
          example: 3
        requirement_id:
          type: integer
          example: 1
        device_attributes:
          type: object
          additionalProperties: true
          description: Arbitrary debug attributes for the device.
        connection_info:
          $ref: '#/components/schemas/ConnectionInfo'

    ConnectionInfo:
      type: object
      required:
        - direct_ecosystem
        - direct_protocol
        - final_ecosystem
        - final_protocol
      properties:
        direct_ecosystem:
          type: string
          example: aqara
        direct_protocol:
          type: string
          example: zigbee
        direct_hub_selected_listing_id:
          type: integer
          nullable: true
          example: 1
        direct_description:
          type: string
          nullable: true
          example: Directly connected to a Zigbee hub.
        final_ecosystem:
          type: string
          example: yandex
        final_protocol:
          type: string
          example: cloud
        final_hub_selected_listing_id:
          type: integer
          nullable: true
          example: null
        final_description:
          type: string
          nullable: true
          example: Integrated into the main ecosystem via cloud bridge.

    ErrorResponse:
      type: object
      required:
        - message
      properties:
        message:
          type: string
          example: Invalid request body
        code:
          type: string
          nullable: true
          example: bad_request
        details:
          type: string
          nullable: true
