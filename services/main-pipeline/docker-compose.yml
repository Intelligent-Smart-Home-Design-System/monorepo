services:
  temporal-postgresql:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: temporal
      POSTGRES_USER: temporal
      POSTGRES_PASSWORD: temporal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U temporal -d temporal"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - temporal-postgresql-data:/var/lib/postgresql/data

  temporal:
    image: temporalio/auto-setup:1.23.0
    depends_on:
      temporal-postgresql:
        condition: service_healthy
    environment:
      DB: postgresql
      DB_PORT: 5432
      POSTGRES_USER: temporal
      POSTGRES_PWD: temporal
      POSTGRES_SEEDS: temporal-postgresql
    ports:
      - "7233:7233"

  temporal-ui:
    image: temporalio/ui:2.21.3
    depends_on:
      - temporal
    environment:
      TEMPORAL_ADDRESS: temporal:7233
    ports:
      - "8088:8080"

  catalog-postgresql:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: smart_home
      POSTGRES_USER: catalog
      POSTGRES_PASSWORD: catalog
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U catalog -d smart_home"]
      interval: 5s
      timeout: 5s
      retries: 20
    ports:
      - "5432:5432"
    volumes:
      - catalog-postgresql-data:/var/lib/postgresql/data

  catalog-db-migrate:
    image: migrate/migrate:v4.18.3
    depends_on:
      catalog-postgresql:
        condition: service_healthy
    command: ["-path", "/migrations", "-database", "postgres://catalog:catalog@catalog-postgresql:5432/smart_home?sslmode=disable", "up"]
    volumes:
      - ../../db/catalog/migrations:/migrations:ro
    restart: "no"

  catalog-db-seed:
    image: postgres:16-alpine
    profiles: [test]
    depends_on:
      catalog-db-migrate:
        condition: service_completed_successfully
    environment:
      PGPASSWORD: catalog
    command: ["psql", "-h", "catalog-postgresql", "-U", "catalog", "-d", "smart_home", "-f", "/seed/seed_catalog.sql"]
    volumes:
      - ./config/seed_catalog.sql:/seed/seed_catalog.sql:ro
    restart: "no"

  main-pipeline:
    build:
      context: .
    depends_on:
      - temporal
      - floor-parser-worker
      - layout-worker
      - device-selection-worker
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_NAMESPACE: default
      METRICS_ADDRESS: :2112
      LOG_LEVEL: info
      OTEL_EXPORTER_OTLP_ENDPOINT: jaeger:4317
    ports:
      - "2112:2112"
    restart: unless-stopped

  api-gateway:
    build:
      context: .
    entrypoint: ["api-gateway"]
    depends_on:
      catalog-postgresql:
        condition: service_healthy
      temporal:
        condition: service_started
      main-pipeline:
        condition: service_started
      catalog-db-migrate:
        condition: service_completed_successfully
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_NAMESPACE: default
      DATABASE_DSN: postgres://catalog:catalog@catalog-postgresql:5432/smart_home?sslmode=disable
      HTTP_ADDRESS: :8080
      METRICS_ADDRESS: :2116
      JWT_SECRET: ${JWT_SECRET:-dev-jwt-secret}
      LOG_LEVEL: info
    ports:
      - "2116:2116"
    restart: unless-stopped

  frontend-api:
    build:
      context: ../frontend-api
    depends_on:
      catalog-postgresql:
        condition: service_healthy
      catalog-db-migrate:
        condition: service_completed_successfully
    environment:
      DATABASE_DSN: postgres://catalog:catalog@catalog-postgresql:5432/smart_home?sslmode=disable
      HTTP_ADDRESS: :8080
    ports:
      - "2117:8080"
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - api-gateway
      - frontend-api
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
    ports:
      - "8090:80"
    restart: unless-stopped

  floor-parser-worker:
    build:
      context: ../floor-parser
    depends_on:
      - temporal
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_NAMESPACE: default
      TEMPORAL_TASK_QUEUE: floor-parser
      METRICS_PORT: 2113
    ports:
      - "2113:2113"
    restart: unless-stopped

  layout-worker:
    build:
      context: ../layout
    depends_on:
      - temporal
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_NAMESPACE: default
      TEMPORAL_TASK_QUEUE: layout
      METRICS_ADDRESS: :2114
    ports:
      - "2114:2114"
    restart: unless-stopped

  device-selection-worker:
    build:
      context: ../device-selection
    depends_on:
      catalog-postgresql:
        condition: service_healthy
      catalog-db-migrate:
        condition: service_completed_successfully
      temporal:
        condition: service_started
    command: ["device-selection", "run", "--config", "/config/device-selection.toml"]
    environment:
      METRICS_PORT: 2115
    volumes:
      - ./config/device-selection.toml:/config/device-selection.toml:ro
    ports:
      - "2115:2115"
    restart: unless-stopped

  jaeger:
    image: jaegertracing/all-in-one:1.57
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"
      - "4317:4317"
      - "4318:4318"

  prometheus:
    image: prom/prometheus:v2.54.1
    command: ["--config.file=/etc/prometheus/prometheus.yml", "--web.listen-address=:9092"]
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9092:9092"

  loki:
    image: grafana/loki:2.9.8
    ports:
      - "3100:3100"

  promtail:
    image: grafana/promtail:2.9.8
    command: ["-config.file=/etc/promtail/config.yml"]
    depends_on:
      - loki
    volumes:
      - ./observability/promtail/promtail-config.yml:/etc/promtail/config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.1.4
    depends_on:
      - prometheus
      - loki
      - promtail
      - jaeger
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "3000:3000"

volumes:
  temporal-postgresql-data:
  catalog-postgresql-data:
  grafana-data:
