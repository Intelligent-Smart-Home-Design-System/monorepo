# Тест 7: scrape + parse listing для wildberries, dns и sprut.
# limit=5 применяется отдельно к каждому source (до 5 scrape + до 5 parse на source).
#
# Запуск (без --sources — все три source):
#   cd monorepo/services/scraper
#   go run ./cmd/scraper scrape --page-types listing --config cmd/scraper/config.local7.toml
#   go run ./cmd/scraper parse --page-types listing --config cmd/scraper/config.local7.toml
#
# Ожидание в логах parse listing summary: saved ≤ 5 на source
# (WB/DNS могут быть меньше, если нет smart_home_markers на карточке).

[database]
host = "localhost"
port = 5432
user = "catalog"
password = "catalog"
dbname = "smart_home"
sslmode = "disable"

[scraping]
max_retries = 3
rate_limit_rps = 2.0
timeout = "60s"
user_agent = "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36"
proxy = ""
wb_card_basket = "01"
wb_session_path = "./session.json"
wb_rps = 50

[wildberries.discovery]
discovery_text_queries = ["умный дом", "zigbee датчик"]
max_pages = 5
url_template = "https://catalog.wb.ru/catalog/electronic15/search?appType=1&curr=rub&dest=-1257786&query={query}&page={page}"

[wildberries]
category_url = "https://www.wildberries.ru/catalog/elektronika/umnyy-dom"
brand_aliases = { "яндекс" = "yandex", "сбер" = "sber", "маруся" = "vk" }
smart_home_device_markers = ["Алиса", "Маруся", "Экосистема умного дома", "Zigbee", "умный дом"]

[yandex]
supported_zigbee_devices_url = "https://alice.yandex.ru/support/ru/smart-home/supported-zigbee-devices"

[dns]
discovery_seeds = [
  "https://www.dns-shop.ru/catalog/9bbe8fe270e7c3ae/umnaa-tehnika/",
]
search_queries = []
max_pages = 1
user_agent = "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36"
brand_aliases = { "яндекс" = "yandex", "сбер" = "sber", "маруся" = "vk", "moes" = "moes" }
smart_home_device_markers = [
  "Алиса", "Маруся", "Zigbee", "умный дом",
  "умная лампа", "умный свет", "Wi-Fi", "WiFi", "Matter", "Умн"
]

[jobs.scrape.wildberries]
limit = 5

[jobs.scrape.dns]
limit = 5

[jobs.scrape.sprut]
limit = 5

[jobs.parse.wildberries]
limit = 5

[jobs.parse.dns]
limit = 5

[jobs.parse.sprut]
limit = 5
