include:
  - path: ./services/pipeline-worker/docker-compose.yaml

services:
  grafana:
    image: grafana/grafana:11.1.4
    depends_on:
      - prometheus
      - loki
      - promtail
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./services/pipeline-worker/observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "${PIPELINE_GRAFANA_PORT:-3000}:3000"
    networks:
      - pipeline

volumes:
  grafana-data:
