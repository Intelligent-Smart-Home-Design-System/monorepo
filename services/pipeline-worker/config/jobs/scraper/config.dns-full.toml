# DNS: полный прогон discovery → listing → parsed_listing_snapshots.
# Запуск с ХОСТА (browser_user_mode=true, обходит Qrator). Postgres: localhost:5432.
#
#   cd services/scraper
#   $cfg = "../../pipeline-worker/config/jobs/scraper/config.dns-full.toml"
#   go run ./cmd/scraper scrape --discovery --sources dns --config $cfg
#   go run ./cmd/scraper parse  --discovery --sources dns --config $cfg
#   go run ./cmd/scraper scrape --page-types listing --sources dns --config $cfg
#   go run ./cmd/scraper parse  --page-types listing --sources dns --config $cfg
#
# Проверка:
#   SELECT COUNT(*) FROM page_snapshots ps
#     JOIN tracked_pages tp ON tp.id = ps.tracked_page
#     WHERE tp.source_name = 'dns' AND ps.scraped_at > now() - interval '1 hour';
#   SELECT COUNT(*) FROM parsed_listing_snapshots pls
#     JOIN page_snapshots ps ON ps.id = pls.page_snapshot_id
#     JOIN tracked_pages tp ON tp.id = ps.tracked_page
#     WHERE tp.source_name = 'dns' AND pls.parsed_at > now() - interval '1 hour';

[database]
host = "localhost"
port = 5432
user = "catalog"
password = "catalog"
dbname = "smart_home"
sslmode = "disable"

[scraping]
# proxy = "http://user:pass@host:port"
max_retries = 3
rate_limit_rps = 2.0
timeout = "90s"
user_agent = "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36"
proxy = ""

[dns]
discovery_seeds = [
  "https://www.dns-shop.ru/catalog/9bbe8fe270e7c3ae/umnaa-tehnika/",
]
search_queries = []
max_pages = 1
max_bfs_fetches = 10
browser_user_mode = true
user_agent = "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36"
brand_aliases = { "яндекс" = "yandex", "сбер" = "sber", "маруся" = "vk", "moes" = "moes" }
smart_home_device_markers = [
  "Алиса", "Маруся", "Zigbee", "умный дом",
  "умная лампа", "умный свет", "Wi-Fi", "WiFi", "Matter", "Умн", "moes"
]

# --- 1) Discovery scrape: seed → BFS → category snapshots ---

[jobs.scrape_discovery.dns]
discovery_bootstrap = ["seed", "db"]
#limit = 10

# --- 2) Discovery parse: category snapshots → listing tasks ---

[jobs.parse_discovery.dns]
#limit = 10

# --- 3) Listing scrape: только listing-задачи, созданные сегодня (после parse) ---

[jobs.scrape.dns]
created_after = 2026-07-09T00:00:00+03:00
#limit = 10

# --- 4) Listing parse → parsed_listing_snapshots ---

[jobs.parse.dns]
scraped_after = 2026-07-09T00:00:00+03:00
#limit = 10
