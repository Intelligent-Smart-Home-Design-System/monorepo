global:
  scrape_interval: 15s
  evaluation_interval: 15s

# Enable remote-write receiver so the OTEL collector can push metrics.
# Requires --web.enable-remote-write-receiver flag on Prometheus.

scrape_configs:
  - job_name: otel-collector
    static_configs:
      - targets: ["otel-collector:8888"]

  # Catalog-pipeline services
  - job_name: pipeline-worker
    static_configs:
      - targets: ["pipeline-worker:2112"]

  # Main-pipeline services
  - job_name: main-pipeline
    static_configs:
      - targets: ["main-pipeline:2112"]

  - job_name: api-gateway
    static_configs:
      - targets: ["api-gateway:2116"]

  - job_name: floor-parser-worker
    static_configs:
      - targets: ["floor-parser-worker:2113"]

  - job_name: layout-worker
    static_configs:
      - targets: ["layout-worker:2114"]

  - job_name: device-selection-worker
    static_configs:
      - targets: ["device-selection-worker:2115"]

  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
