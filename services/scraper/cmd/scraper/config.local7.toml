# Тест 7: полный прогон discovery → listing для wildberries, dns и sprut.
# limit=5 на каждый source и job; временные фильтры отсекают старые записи в полной БД.
#
# Подставьте полночь нужного дня в created_after / scraped_after (MSK, +03:00).
#
# 1) Discovery scrape — только задачи, появившиеся сегодня (created_after):
#   go run ./cmd/scraper scrape --discovery --config cmd/scraper/config.local7.toml
#
# 2) Discovery parse — только снимки, снятые сегодня (scraped_after):
#   go run ./cmd/scraper parse --discovery --config cmd/scraper/config.local7.toml
#
# 3) Listing scrape — новые listing-задачи с сегодняшнего parse:
#   go run ./cmd/scraper scrape --page-types listing --config cmd/scraper/config.local7.toml
#
# 4) Listing parse:
#   go run ./cmd/scraper parse --page-types listing --config cmd/scraper/config.local7.toml
#
# Ожидание: ≤5 задач/снимков на source на каждом этапе; saved listing ≤5 (WB/DNS — с маркерами).

[database]
host = "localhost"
port = 5432
user = "catalog"
password = "catalog"
dbname = "smart_home"
sslmode = "disable"

[scraping]
max_retries = 3
rate_limit_rps = 2.0
timeout = "60s"
user_agent = "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36"
proxy = ""
wb_card_basket = "01"
wb_session_path = "./session.json"
wb_rps = 50

[wildberries.discovery]
discovery_text_queries = ["умный дом", "zigbee датчик"]
max_pages = 5
url_template = "https://catalog.wb.ru/catalog/electronic15/search?appType=1&curr=rub&dest=-1257786&query={query}&page={page}"

[wildberries]
category_url = "https://www.wildberries.ru/catalog/elektronika/umnyy-dom"
brand_aliases = { "яндекс" = "yandex", "сбер" = "sber", "маруся" = "vk" }
smart_home_device_markers = ["Алиса", "Маруся", "Экосистема умного дома", "Zigbee", "умный дом"]

[yandex]
supported_zigbee_devices_url = "https://alice.yandex.ru/support/ru/smart-home/supported-zigbee-devices"

[dns]
discovery_seeds = [
  "https://www.dns-shop.ru/catalog/9bbe8fe270e7c3ae/umnaa-tehnika/",
]
search_queries = []
max_pages = 1
user_agent = "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36"
brand_aliases = { "яндекс" = "yandex", "сбер" = "sber", "маруся" = "vk", "moes" = "moes" }
smart_home_device_markers = [
  "Алиса", "Маруся", "Zigbee", "умный дом",
  "умная лампа", "умный свет", "Wi-Fi", "WiFi", "Matter", "Умн"
]

# --- Discovery: scrape tracked_pages (created_after = first_seen_at) ---

[jobs.scrape_discovery.wildberries]
discovery_bootstrap = ["db"]
created_after = 2026-06-30T00:00:00+03:00
limit = 5

[jobs.scrape_discovery.dns]
discovery_bootstrap = ["db"]
created_after = 2026-06-30T00:00:00+03:00
limit = 5

# --- Discovery: parse page_snapshots (scraped_after = scraped_at) ---

[jobs.parse_discovery.wildberries]
scraped_after = 2026-06-30T00:00:00+03:00
limit = 5

[jobs.parse_discovery.dns]
scraped_after = 2026-06-30T00:00:00+03:00
limit = 5

# --- Listing: scrape новых задач (created_after) / parse свежих снимков (scraped_after) ---

[jobs.scrape.wildberries]
created_after = 2026-06-30T00:00:00+03:00
limit = 5

[jobs.scrape.dns]
created_after = 2026-06-30T00:00:00+03:00
limit = 5

[jobs.scrape.sprut]
created_after = 2026-06-30T00:00:00+03:00
limit = 5

[jobs.parse.wildberries]
scraped_after = 2026-06-30T00:00:00+03:00
limit = 5

[jobs.parse.dns]
scraped_after = 2026-06-30T00:00:00+03:00
limit = 5

[jobs.parse.sprut]
scraped_after = 2026-06-30T00:00:00+03:00
limit = 5
