[database]
host = "localhost"
port = 5432
user = "catalog"
password = "catalog"
dbname = "smart_home"
sslmode = "disable"

[scraping]
max_retries = 3
rate_limit_rps = 2.0
timeout = "120s"
user_agent = "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36"
# HTTP/SOCKS proxy for all HTTP and Chrome requests (http://, socks5://, or host:port)
proxy = ""

[dns]
discovery_seeds = [
  "https://www.dns-shop.ru/catalog/9bbe8fe270e7c3ae/umnaa-tehnika/",
]
max_bfs_fetches = 10
browser_user_mode = true
brand_aliases = { "moes" = "moes" }
smart_home_device_markers = ["Zigbee", "умный дом", "Алиса", "Matter", "moes"]

[jobs.scrape_discovery.dns]
discovery_bootstrap = ["seed", "db"]
limit = 10
