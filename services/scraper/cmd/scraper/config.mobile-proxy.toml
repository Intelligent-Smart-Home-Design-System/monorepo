# Mobile proxy — 3h test window (host only, Postgres localhost).
#
# Credentials: do NOT commit. Set before each run:
#   $env:SCRAPER_SCRAPING_PROXY = "http://USER:PASS@188.143.169.27:30151"
#   Megafon example (HTTP port 30151, SOCKS 40151 — use HTTP for scraper):
#   $env:SCRAPER_SCRAPING_PROXY = "http://iparchitect_XXXXX:PASSWORD@188.143.169.27:30151"
#
# Quick check:
#   cd services/scraper
#   .\scripts\test-mobile-proxy.ps1
#
# Full DNS smoke (limit 15 per job, ~30–60 min):
#   go run ./cmd/scraper scrape --discovery --sources dns --config cmd/scraper/config.mobile-proxy.toml
#   go run ./cmd/scraper parse  --discovery --sources dns --config cmd/scraper/config.mobile-proxy.toml
#   go run ./cmd/scraper scrape --page-types listing --sources dns --config cmd/scraper/config.mobile-proxy.toml
#   go run ./cmd/scraper parse  --page-types listing --sources dns --config cmd/scraper/config.mobile-proxy.toml
#
# WB session (paths in config.wb-smoke.toml):
#   go run ./cmd/wbsession -config cmd/scraper/config.wb-smoke.toml
# WB micro-steps:
#   .\scripts\test-wb-smoke.ps1 -Step 1
#
# Notes:
# - HTTP client uses proxy auth (user:pass) — OK.
# - Chrome: if proxy has user:pass, scraper starts local forwarder on 127.0.0.1 automatically.
# - Prefer sticky session / same mobile IP for the whole 3h window.
# - rate_limit_rps=1 saves traffic and reduces blocks.

[database]
host = "localhost"
port = 5432
user = "catalog"
password = "catalog"
dbname = "smart_home"
sslmode = "disable"

[scraping]
max_retries = 2
rate_limit_rps = 1.0
timeout = "120s"
user_agent = "Mozilla/5.0 (Linux; Android 14; Mobile) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Mobile Safari/537.36"
proxy = ""
wb_card_basket = "01"
wb_session_path = "session.json"
wb_rps = 1

[wildberries.discovery]
discovery_text_queries = ["умный дом"]
max_pages = 1
url_template = "https://www.wildberries.ru/__internal/u-search/exactmatch/ru/common/v18/search?ab_testid=model_distance_deboost_on&appType=1&curr=rub&dest=123589415&hide_vflags=4294967296&lang=ru&locale=ru&page={page}&query={query}&resultset=catalog&sort=popular&spp=30&suppressSpellcheck=false"

[wildberries]
browser_user_mode = true
brand_aliases = { "яндекс" = "yandex", "сбер" = "sber", "маруся" = "vk" }
smart_home_device_markers = ["Алиса", "Маруся", "Zigbee", "умный дом", "Matter"]

[dns]
discovery_seeds = [
  "https://www.dns-shop.ru/catalog/9bbe8fe270e7c3ae/umnaa-tehnika/",
]
search_queries = []
max_pages = 1
max_bfs_fetches = 15
browser_user_mode = true
user_agent = "Mozilla/5.0 (Linux; Android 14; Mobile) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Mobile Safari/537.36"
brand_aliases = { "яндекс" = "yandex", "сбер" = "sber", "маруся" = "vk", "moes" = "moes" }
smart_home_device_markers = [
  "Алиса", "Маруся", "Zigbee", "умный дом",
  "умная лампа", "умный свет", "Wi-Fi", "WiFi", "Matter", "Умн", "moes"
]

# --- DNS: 15 tasks per phase (~45 min total) ---

[jobs.scrape_discovery.dns]
discovery_bootstrap = ["seed", "db"]
limit = 15

[jobs.parse_discovery.dns]
limit = 15

[jobs.scrape.dns]
created_after = 2026-07-09T00:00:00+03:00
limit = 15

[jobs.parse.dns]
scraped_after = 2026-07-09T00:00:00+03:00
limit = 15

# --- WB: 10 tasks per phase (~30 min) ---

[jobs.scrape_discovery.wildberries]
discovery_bootstrap = ["seed"]
limit = 10

[jobs.parse_discovery.wildberries]
limit = 10

[jobs.scrape.wildberries]
created_after = 2026-07-09T00:00:00+03:00
limit = 10

[jobs.parse.wildberries]
scraped_after = 2026-07-09T00:00:00+03:00
limit = 10
